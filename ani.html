<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2nd Anniversary Photo Collage</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f3e8;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 20px;
            text-align: center;
            color: #5d4037;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        p {
            font-size: 1.1rem;
            margin-top: 0;
        }

        .collage-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 15px;
            max-width: 900px;
            padding: 20px;
            margin-bottom: 40px;
        }

        .collage-item {
            background-color: #fff;
            border: 5px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            border-radius: 8px;
            transition: transform 0.2s ease-in-out;
            position: relative;
        }

        .collage-item:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .collage-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Span across columns for variety */
        .item-1 {
            grid-column: span 2;
            grid-row: span 2;
        }
        
        .item-5 {
            grid-column: span 1;
            grid-row: span 2;
        }
    </style>
</head>
<body>

    <header>
        <h1>Our Second Year</h1>
        <p>Happy 2nd Anniversary, [ALISHA]!</p>
    </header>

    <div class="collage-container">
        <div class="collage-item item-1">
            <img src="9ec53879-b8d1-4bf4-9386-5e876a762f90-1_all_11992.jpg" alt="Formal anniversary portrait of the couple">
        </div>
        <div class="collage-item item-2">
            <img src="9ec53879-b8d1-4bf4-9386-5e876a762f90-1_all_10869.png" alt="Couple embracing on a lit path by the water">
        </div>
        <div class="collage-item item-3">
            <img src="9ec53879-b8d1-4bf4-9386-5e876a762f90-1_all_7981.jpg" alt="Candid joyful photo of the woman">
        </div>
        <div class="collage-item item-4">
            <img src="9ec53879-b8d1-4bf4-9386-5e876a762f90-1_all_7976.jpg" alt="Video call screenshot of the couple laughing">
        </div>
        <div class="collage-item item-5">
            <img src="9ec53879-b8d1-4bf4-9386-5e876a762f90-1_all_7977.jpg" alt="Happy moment in traditional attire during a video call">
        </div>
        <div class="collage-item item-6">
            <img src="9ec53879-b8d1-4bf4-9386-5e876a762f90-1_all_7983.jpg" alt="Couple making a silly face together during a video call">
        </div>
        <div class="collage-item item-7">
            <img src="9ec53879-b8d1-4bf4-9386-5e876a762f90-1_all_7424.jpg" alt="Relaxed and joyful snapshot from a video call">
        </div>
        <div class="collage-item item-8">
            <img src="9ec53879-b8d1-4bf4-9386-5e876a762f90-1_all_9913.jpg" alt="Couple wrapped in a warm embrace on a video call">
        </div>
        <div class="collage-item item-9">
            <img src="9ec53879-b8d1-4bf4-9386-5e876a762f90-1_all_9921.jpg" alt="Sharing a fun, lighthearted expression on a video call">
        </div>
        <div class="collage-item item-10">
            <img src="9ec53879-b8d1-4bf4-9386-5e876a762f90-1_all_5896.jpg" alt="Casual and affectionate close-up of the couple">
        </div>
    </div>

</body>
</html>
